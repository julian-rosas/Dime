name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  cdk-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dimeCDK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dimeCDK/package-lock.json
            dimeBackend/package-lock.json

      - name: Install backend dependencies
        run: npm install
        working-directory: dimeBackend

      - name: Install CDK dependencies
        run: npm install

      - name: Clean
        run: npm run clean

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

      - name: Synth dev stack
        run: npm run synth:dev
