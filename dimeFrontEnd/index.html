<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dime — Tu dinero en conversación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12);
      --text: #f0f0f0;
      --text-muted: #888;
      --bubble-user: #00e5a0;
      --bubble-user-text: #0a0a0a;
      --bubble-bot: #1e1e1e;
      --bubble-bot-text: #f0f0f0;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Header ── */
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: #000;
      font-family: var(--mono);
    }

    .header-info h1 {
      font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
    }

    .header-info p {
      font-size: 11px; color: var(--accent); font-weight: 500;
    }

    .balance-pill {
      margin-left: auto;
      background: var(--accent-dim);
      border: 1px solid rgba(0,229,160,0.25);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .bubble-wrap.user { align-self: flex-end; align-items: flex-end; }
    .bubble-wrap.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: var(--bubble-user);
      color: var(--bubble-user-text);
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }

    .bubble.bot {
      background: var(--bubble-bot);
      color: var(--bubble-bot-text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Bold en mensajes bot */
    .bubble.bot b, .bubble.bot strong {
      color: var(--accent);
      font-weight: 600;
    }

    /* Italic como código */
    .bubble.bot em {
      background: var(--accent-dim);
      color: var(--accent);
      font-style: normal;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .timestamp {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 14px;
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 6px; height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input ── */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
    }

    .input-wrap {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 2px 4px 2px 14px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 100px;
      padding: 9px 0;
    }

    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.15s;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .send-btn svg { width: 16px; height: 16px; }

    /* ── Quick actions ── */
    .quick-actions {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .quick-actions::-webkit-scrollbar { display: none; }

    .qa-btn {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .qa-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">D</div>
    <div class="header-info">
      <h1>Dime</h1>
      <p>● en línea</p>
    </div>
    <div class="balance-pill" id="balancePill">$1,500.00</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="quick-actions" id="quickActions">
    <button class="qa-btn" onclick="sendQuick('¿Cuánto tengo?')">💳 Mi saldo</button>
    <button class="qa-btn" onclick="sendQuick('Enviar dinero')">💸 Transferir</button>
    <button class="qa-btn" onclick="sendQuick('Mis ahorros')">🎯 Cajitas</button>
    <button class="qa-btn" onclick="sendQuick('ayuda')">❓ Ayuda</button>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="msgInput"
        placeholder="Escribe aquí... ej. enviar 200 a Juan"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // ─── Configuración ─────────────────────────────────────────────────────────
  // Reemplaza esto con la URL que imprime CDK después del deploy
  const API_URL = "https://TU_API_GATEWAY_URL.execute-api.us-east-1.amazonaws.com/prod/message";

  // Genera o recupera un sessionId único por navegador
  let sessionId = localStorage.getItem("dime_session");
  if (!sessionId) {
    sessionId = "session_" + Math.random().toString(36).slice(2, 11);
    localStorage.setItem("dime_session", sessionId);
  }

  let isLoading = false;

  // ─── Render helpers ────────────────────────────────────────────────────────
  function addBubble(text, role) {
    const wrap = document.createElement("div");
    wrap.className = `bubble-wrap ${role}`;

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;

    // Convierte *texto* en <em> y **texto** en <b>
    const formatted = text
      .replace(/\*\*(.+?)\*\*/g, "<b>$1</b>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>");
    bubble.innerHTML = formatted;

    const ts = document.createElement("div");
    ts.className = "timestamp";
    ts.textContent = new Date().toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });

    wrap.appendChild(bubble);
    wrap.appendChild(ts);
    document.getElementById("messages").appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap bot";
    wrap.id = "typingIndicator";
    wrap.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    document.getElementById("messages").appendChild(wrap);
    scrollBottom();
  }

  function hideTyping() {
    document.getElementById("typingIndicator")?.remove();
  }

  function scrollBottom() {
    const el = document.getElementById("messages");
    el.scrollTop = el.scrollHeight;
  }

  function updateBalance(state) {
    if (state?.balance != null) {
      document.getElementById("balancePill").textContent =
        "$" + state.balance.toLocaleString("es-MX", { minimumFractionDigits: 2 });
    }
  }

  // ─── Envío de mensajes ─────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById("msgInput");
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = "";
    autoResize(input);
    addBubble(text, "user");

    isLoading = true;
    document.getElementById("sendBtn").disabled = true;
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId, message: text }),
      });

      const data = await res.json();
      hideTyping();

      if (data.reply) {
        addBubble(data.reply, "bot");
        updateBalance(data.state);
      } else {
        addBubble("Algo salió mal. Inténtalo de nuevo.", "bot");
      }
    } catch (err) {
      hideTyping();
      addBubble("No pude conectarme al servidor. Verifica tu conexión.", "bot");
      console.error(err);
    } finally {
      isLoading = false;
      document.getElementById("sendBtn").disabled = false;
      input.focus();
    }
  }

  function sendQuick(text) {
    document.getElementById("msgInput").value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 100) + "px";
  }

  // ─── Bienvenida ────────────────────────────────────────────────────────────
  window.addEventListener("load", () => {
    addBubble(
      "¡Hola! Soy Dime 👋\n\nPuedo ayudarte a *enviar dinero*, *ver tu saldo* y *ahorrar*.\n\n¿Qué quieres hacer hoy?",
      "bot"
    );
  });
</script>
</body>
</html>
